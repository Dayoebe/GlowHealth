<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#0a0a0a">
        <title>Glow Health Offline</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                display: grid;
                place-items: center;
                background: #fbfaf7;
                color: #171717;
                font-family: Ubuntu, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            main {
                width: min(92vw, 32rem);
                padding: 2rem;
                border: 1px solid #e7e5e4;
                border-radius: .5rem;
                background: #ffffff;
                box-shadow: 0 18px 50px rgba(23, 23, 23, .08);
            }

            img {
                width: 4rem;
                height: 4rem;
                border-radius: .375rem;
                object-fit: cover;
            }

            h1 {
                margin: 1.5rem 0 .75rem;
                font-size: clamp(1.75rem, 9vw, 2.5rem);
                line-height: 1.05;
            }

            p {
                margin: 0;
                color: #57534e;
                line-height: 1.7;
            }
        </style>
    </head>
    <body>
        <main>
            <img src="/icons/icon-192x192.png" alt="Glow Health icon">
            <h1>You are offline.</h1>
            <p>Glow Healthcare Outreach Initiative is installed on this device. Reconnect to view the latest outreach details and partnership information.</p>
        </main>
    </body>
</html>

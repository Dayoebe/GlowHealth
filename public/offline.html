<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#172554">
        <title>Glow Medical Offline</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                display: grid;
                place-items: center;
                background: linear-gradient(135deg, #172554 0%, #312e81 52%, #7c2d12 100%);
                color: #ffffff;
                font-family: Ubuntu, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            main {
                width: min(92vw, 32rem);
                padding: 2rem;
                border: 1px solid rgba(255, 255, 255, .16);
                border-radius: .5rem;
                background: rgba(255, 255, 255, .1);
                box-shadow: 0 18px 50px rgba(15, 23, 42, .22);
                backdrop-filter: blur(18px);
            }

            img {
                width: 4rem;
                height: 4rem;
                border-radius: .375rem;
                object-fit: cover;
            }

            h1 {
                margin: 1.5rem 0 .75rem;
                font-size: clamp(1.75rem, 9vw, 2.5rem);
                line-height: 1.05;
            }

            p {
                margin: 0;
                color: #dbeafe;
                line-height: 1.7;
            }
        </style>
    </head>
    <body>
        <main>
            <img src="/icons/icon-192x192.png" alt="Glow Medical icon">
            <h1>You are offline.</h1>
            <p>Glow Free Medical Initiative is installed on this device. Reconnect to view the latest outreach registration, free healthcare services, volunteer, and sponsorship information.</p>
        </main>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="theme-color" content="#071b57">
        <title>Glow Medical Offline</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                margin: 0;
                display: grid;
                place-items: center;
                background: #f4f7ff;
                color: #061235;
                font-family: Ubuntu, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            main {
                width: min(92vw, 32rem);
                padding: 2rem;
                border: 1px solid #c8d5ff;
                border-top: 4px solid #f4510b;
                border-radius: .5rem;
                background: #ffffff;
                box-shadow: 0 18px 50px rgba(7, 27, 87, .12);
            }

            img {
                width: 4rem;
                height: 4rem;
                border-radius: .375rem;
                object-fit: cover;
            }

            h1 {
                margin: 1.5rem 0 .75rem;
                font-size: clamp(1.75rem, 9vw, 2.5rem);
                line-height: 1.05;
            }

            p {
                margin: 0;
                color: #44536b;
                line-height: 1.7;
            }
        </style>
    </head>
    <body>
        <main>
            <img src="/icons/icon-192x192.png" alt="Glow Health Outreach Initiative logo">
            <h1>You are offline.</h1>
            <p>Glow Health Outreach Initiative is installed on this device. Reconnect to view the latest outreach registration, free healthcare services, volunteer, and sponsorship information.</p>
        </main>
    </body>
</html>
